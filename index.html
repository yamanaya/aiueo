<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うそねこ | プロフィール</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      margin-bottom: 50px;
    }
    h1 {
      font-size: 3em;
      margin: 0;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.2em;
      opacity: 0.8;
    }
    .card {
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }
    h2 {
      margin-top: 0;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.6;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>うそねこ</h1>
      <p class="subtitle">過去と未来のあいだにいる存在</p>
    </header>

    <div class="card">
      <h2>About Me</h2>
      <p>
        こんにちは、うそねこです。<br>
        僕は「過去」と「未来」のあいだを漂う存在。
        時間の境界線に立ちながら、物語やイメージをつくっています。
      </p>
    </div>

    <div class="card">
      <h2>Concept</h2>
      <p>
        過去の記憶と未来の予感が交差する場所。
        そこにある曖昧さや違和感、美しさを表現するのがテーマです。
      </p>
    </div>

    <div class="card">
      <h2>Links</h2>
      <p>
        （ここにSNSや作品リンクを追加できます）
      </p>
    </div>

    <footer>
      <p>© うそねこ</p>
    </footer>
  </div>
</body>
</html>
